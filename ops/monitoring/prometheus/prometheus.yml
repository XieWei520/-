global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: wukongim_gateway
    static_configs:
      - targets:
          - host.docker.internal:5300

  - job_name: wukongim_api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /run/secrets/wukongim_metrics_token
    static_configs:
      - targets:
          - host.docker.internal:8080
