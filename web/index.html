  <style>
    .icp-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 10000;
      display: flex;
      justify-content: center;
      padding: 0 12px;
      pointer-events: none;
      text-align: center;
    }

    .icp-footer a {
      pointer-events: auto;
      border-radius: 4px;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.86);
      color: rgba(16, 32, 51, 0.68);
      font: 12px/1.5 "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      letter-spacing: 0;
      text-decoration: none;
    }

    .icp-footer a:focus,
    .icp-footer a:hover {
      color: rgba(14, 116, 144, 0.95);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <footer class="icp-footer" aria-label="ICP备案信息">
    <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">湘ICP备2026016828号-1</a>
  </footer>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    (function wkInstallStartupRecovery() {
      var bootstrapLoaded = false;
      var recoveryStarted = false;

      function wkRegisterPwaServiceWorker() {
        if (!('serviceWorker' in navigator)) {
          return;
        }
        function registerWorker() {
          navigator.serviceWorker.register('wk_pwa_service_worker.js')
            .catch(function (error) {
              console.debug('WK PWA service worker registration failed', error);
            });
        }
        if (document.readyState === 'complete') {
          registerWorker();
          return;
        }
        window.addEventListener('load', registerWorker, { once: true });
      }

      function loadBootstrap() {
        if (bootstrapLoaded) {
          return;
        }
        bootstrapLoaded = true;
        var script = document.createElement('script');
        script.src = 'flutter_bootstrap.js';
        script.async = true;
        document.body.appendChild(script);
        wkRegisterPwaServiceWorker();
      }

      function clearLegacyBrowserState() {
        var unregister = navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            return Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          });
        var clearCaches = window.caches
          ? caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) {
                return caches.delete(key);
              }));
            })
          : Promise.resolve();

        return Promise.all([unregister, clearCaches]);
      }

      function reloadAfterRecovery() {
        if (navigator.serviceWorker.controller &&
            sessionStorage.getItem('wk_sw_reset_reloaded') !== '1') {
          sessionStorage.setItem('wk_sw_reset_reloaded', '1');
          window.location.reload();
          return;
        }
        sessionStorage.removeItem('wk_sw_reset_reloaded');
        sessionStorage.setItem('wk_sw_recovery_attempted', '1');
        loadBootstrap();
      }

      function recoverFromStartupFailure() {
        if (searchParams.get('wk_reset_sw') === '1' ||
            sessionStorage.getItem('wk_sw_recovery_attempted') === '1') {
          return Promise.resolve(false);
        }
        if (recoveryStarted) {
          return Promise.resolve(true);
        }
        recoveryStarted = true;
        sessionStorage.setItem('wk_sw_recovery_attempted', '1');

        if (!('serviceWorker' in navigator)) {
          var url = new URL(window.location.href);
          url.searchParams.set('wk_reset_sw', '1');
          window.location.replace(url.toString());
          return Promise.resolve(true);
        }

        return clearLegacyBrowserState()
          .then(function () {
            window.location.reload();
            return true;
          })
          .catch(function (error) {
            console.debug('WK startup recovery failed', error);
            var url = new URL(window.location.href);
            url.searchParams.set('wk_reset_sw', '1');
            window.location.replace(url.toString());
            return true;
          });
      }

      window.wkRecoverFromStartupFailure = recoverFromStartupFailure;

      var searchParams = new URLSearchParams(window.location.search);
      var shouldResetLegacyWorkers = searchParams.get('wk_reset_sw') === '1';
      if (!shouldResetLegacyWorkers) {
        loadBootstrap();
        return;
      }

      if (!('serviceWorker' in navigator)) {
        loadBootstrap();
        return;
      }

      clearLegacyBrowserState()
        .then(reloadAfterRecovery)
        .catch(loadBootstrap);
    })();
  </script>
</body>
</html>
