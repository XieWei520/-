<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>悟空 IM - 离线</title>
    <style>
      :root {
        color: #111827;
        background: #f6f7f9;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding:
          max(24px, env(safe-area-inset-top))
          max(18px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(18px, env(safe-area-inset-left));
      }

      main {
        width: min(100%, 420px);
        padding: 22px;
        border: 1px solid #d8dee8;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.25;
      }

      p {
        margin: 10px 0 0;
        color: #64748b;
        font-size: 0.95rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前离线</h1>
      <p>悟空 IM 暂时无法连接网络。请检查网络后返回应用，已缓存的页面会继续保留。</p>
    </main>
  </body>
</html>
