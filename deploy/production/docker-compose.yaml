services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      tsdd-api:
        condition: service_healthy
      callgateway:
        condition: service_healthy
      livekit:
        condition: service_started
    environment:
      NGINX_CLIENT_MAX_BODY_SIZE: "${NGINX_CLIENT_MAX_BODY_SIZE}"
      PUBLIC_DOMAIN: "${PUBLIC_DOMAIN}"
    ports:
      - "${PUBLIC_HTTP_PORT}:80"
      - "${PUBLIC_HTTPS_PORT}:443"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${NGINX_SSL_CERT_PATH}:/etc/nginx/certs/fullchain.pem:ro
      - ${NGINX_SSL_KEY_PATH}:/etc/nginx/certs/privkey.pem:ro
      - ./certbot/www:/var/www/certbot:ro

  wukongim:
    image: ${WUKONGIM_IMAGE:-wukongim/wukongim:v2.2.4-redacted-20260503}
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"${WK_MANAGER_TOKEN}\" ]; then wget --header='token: ${WK_MANAGER_TOKEN}' -q -O /dev/null http://127.0.0.1:5001/health > /dev/null 2>&1; else wget -q -O /dev/null http://127.0.0.1:5001/health > /dev/null 2>&1; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${PUBLIC_WK_API_BIND}:5001"
    volumes:
      - ./rendered/wk.yaml:/root/wukongim/wk.yaml:ro
      - ./data/wukongim:/root/wukongim/data
      - ./logs/wukongim:/root/wukongim/logs

  tsdd-api:
    build:
      context: ../..
      dockerfile: deploy/production/Dockerfile.tsdd
      args:
        BUILD_VERSION: "${BUILD_VERSION}"
        BUILD_COMMIT: "${BUILD_COMMIT}"
        BUILD_COMMIT_DATE: "${BUILD_COMMIT_DATE}"
        BUILD_TREE_STATE: "${BUILD_TREE_STATE}"
    image: wukongim/tsdd-api:production-local
    restart: always
    command: ["api"]
    environment:
      WK_CALL_TICKET_SECRET: "${WK_CALL_TICKET_SECRET}"
      MONITOR_CREDENTIAL_SECRET_KEY: "${MONITOR_CREDENTIAL_SECRET_KEY}"
      WK_WEB_PUSH_VAPID_PUBLIC_KEY: "${WK_WEB_PUSH_VAPID_PUBLIC_KEY}"
      WK_WEB_PUSH_VAPID_PRIVATE_KEY: "${WK_WEB_PUSH_VAPID_PRIVATE_KEY}"
      WK_WEB_PUSH_VAPID_SUBJECT: "${WK_WEB_PUSH_VAPID_SUBJECT}"
      WUKONGIM_METRICS_TOKEN: "${WUKONGIM_METRICS_TOKEN}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      wukongim:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./rendered/tsdd.yaml:/home/configs/tsdd.yaml:ro
      - ./data/tsdd:/home/data
      - ./logs/tsdd:/home/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/v1/ping"]
      interval: 15s
      timeout: 5s
      retries: 10

  callgateway:
    build:
      context: ../..
      dockerfile: deploy/production/Dockerfile.tsdd
      args:
        BUILD_VERSION: "${BUILD_VERSION}"
        BUILD_COMMIT: "${BUILD_COMMIT}"
        BUILD_COMMIT_DATE: "${BUILD_COMMIT_DATE}"
        BUILD_TREE_STATE: "${BUILD_TREE_STATE}"
    image: wukongim/tsdd-api:production-local
    restart: always
    command: ["callgateway"]
    environment:
      WK_CALL_TICKET_SECRET: "${WK_CALL_TICKET_SECRET}"
      WK_CALLGATEWAY_ADDR: ":8091"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./rendered/tsdd.yaml:/home/configs/tsdd.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8091/v1/callgateway/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  livekit:
    image: livekit/livekit-server:v1.9.8
    restart: always
    command: ["--config", "/etc/livekit/livekit.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./rendered/livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

  coturn:
    image: coturn/coturn:4.7.0-r2
    restart: always
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./rendered/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./rendered/coturn-certs/fullchain.pem:/etc/coturn/certs/fullchain.pem:ro
      - ./rendered/coturn-certs/privkey.pem:/etc/coturn/certs/privkey.pem:ro
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
      - "49160-49220:49160-49220/udp"

  mysql:
    image: mysql:8.0
    restart: always
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./mysql/conf.d/production.cnf:/etc/mysql/conf.d/production.cnf:ro

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./data/redis:/data

  minio:
    image: "${MINIO_IMAGE}"
    restart: always
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./data/minio:/data
