global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: wukongim
    metrics_path: /varz
    static_configs:
      - targets:
          - host.docker.internal:5001

  - job_name: nginx
    metrics_path: /stub_status
    static_configs:
      - targets:
          - nginx:80
